name: Deploy Backend to Cloud Run

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: cloud-run-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'

      - name: Run tests
        run: pytest -q --ignore=tests/test_firestore_emulator.py

  firestore-emulator:
    name: Firestore Emulator Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'
          npm install --global firebase-tools
      - name: Run Firestore transaction tests
        run: >-
          firebase emulators:exec --only firestore
          'GCLOUD_PROJECT=dailyopic-test pytest -q tests/test_firestore_emulator.py'

  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest
    needs: [test, firestore-emulator]
    if: github.event_name == 'push'

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ secrets.GCP_REGION }}
      SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
      REPOSITORY: ${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }}
      RUNTIME_SA: dailyopic-cloudrun@opicmobile-45cd5.iam.gserviceaccount.com
      IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }}/${{ secrets.CLOUD_RUN_SERVICE }}:sha-${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate deployment secrets
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [[ -z "${GCP_SA_KEY}" ]]; then
            echo "::error::Repository secret GCP_SA_KEY is required for deployment."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build Docker image
        run: docker build -t "${IMAGE}" .

      - name: Push Docker image
        run: docker push "${IMAGE}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE}" \
            --image "${IMAGE}" \
            --region "${REGION}" \
            --platform managed \
            --project "${PROJECT_ID}" \
            --service-account "${RUNTIME_SA}" \
            --no-traffic \
            --tag "candidate-${GITHUB_SHA::8}" \
            --quiet

      - name: Verify health endpoint
        run: |
          CANDIDATE_TAG="candidate-${GITHUB_SHA::8}"
          SERVICE_URL=""

          for attempt in {1..10}; do
            SERVICE_URL="$(
              gcloud run services describe "${SERVICE}" \
                --region "${REGION}" \
                --project "${PROJECT_ID}" \
                --format=json \
              | jq -r --arg tag "${CANDIDATE_TAG}" \
                  '[.status.traffic[]? | select(.tag == $tag) | .url][0] // empty'
            )"

            if [[ "${SERVICE_URL}" == https://* ]]; then
              break
            fi

            echo "Candidate URL is not available yet (attempt ${attempt}/10)."
            sleep 3
          done

          if [[ "${SERVICE_URL}" != https://* ]]; then
            echo "::error::Cloud Run candidate URL was not found for tag ${CANDIDATE_TAG}."
            gcloud run services describe "${SERVICE}" \
              --region "${REGION}" \
              --project "${PROJECT_ID}" \
              --format='table(status.traffic.tag,status.traffic.revisionName,status.traffic.url)'
            exit 1
          fi

          curl --fail --show-error --silent \
            --retry 5 \
            --retry-all-errors \
            --retry-delay 3 \
            --connect-timeout 10 \
            --max-time 30 \
            "${SERVICE_URL}/health"

      - name: Promote verified revision
        run: >-
          gcloud run services update-traffic "${SERVICE}"
          --region "${REGION}"
          --project "${PROJECT_ID}"
          --to-latest
          --quiet
