name: Deploy Backend to Cloud Run

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: cloud-run-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'

      - name: Run tests
        run: pytest -q --ignore=tests/test_firestore_emulator.py

  firestore-emulator:
    name: Firestore Emulator Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'
          npm install --global firebase-tools
      - name: Run Firestore transaction tests
        run: >-
          firebase emulators:exec --only firestore
          'GCLOUD_PROJECT=dailyopic-test pytest -q tests/test_firestore_emulator.py'

  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest
    needs: [test, firestore-emulator]
    if: github.event_name == 'push'

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ secrets.GCP_REGION }}
      SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
      REPOSITORY: ${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }}
      RUNTIME_SA: dailyopic-cloudrun@opicmobile-45cd5.iam.gserviceaccount.com
      IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }}/${{ secrets.CLOUD_RUN_SERVICE }}:sha-${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build Docker image
        run: docker build -t "${IMAGE}" .

      - name: Push Docker image
        run: docker push "${IMAGE}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE}" \
            --image "${IMAGE}" \
            --region "${REGION}" \
            --platform managed \
            --project "${PROJECT_ID}" \
            --service-account "${RUNTIME_SA}" \
            --no-traffic \
            --tag "candidate-${GITHUB_SHA::8}" \
            --quiet

      - name: Verify health endpoint
        run: |
          SERVICE_URL="$(gcloud run services describe "${SERVICE}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --format="value(status.traffic[?tag='candidate-${GITHUB_SHA::8}'].url)")"
          curl -fsS "${SERVICE_URL}/health"

      - name: Promote verified revision
        run: >-
          gcloud run services update-traffic "${SERVICE}"
          --region "${REGION}"
          --project "${PROJECT_ID}"
          --to-latest
          --quiet
